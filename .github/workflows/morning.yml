'on':
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

name: Ranné rybárske hlásenie

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Stiahni počasie, spočítaj skóre, zapeč do index.html
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NOTIFY_THRESHOLD: '65'
        run: node scripts/generate.js

      - name: Commitni a pushni zmenu
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Ranná aktualizácia počasia"
          git push
